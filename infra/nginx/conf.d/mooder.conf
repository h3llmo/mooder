server {
  listen 80;
  server_name localhost;

  # Variables force per-request DNS resolution via the resolver in nginx.conf.
  # nginx starts cleanly even when backend/frontend are not yet running.
  set $backend    http://backend:8080;
  set $frontend   http://frontend:3000;
  set $keycloak   http://keycloak:8080;
  set $grafana    http://grafana:3000;
  set $prometheus http://prometheus:9090;

  # ── Backend API ──────────────────────────────────────────────────────────
  location /api/ {
    rewrite ^/api/(.*)$ /$1 break;
    proxy_pass         $backend;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
  }

  # ── WebSocket (chat real-time) ────────────────────────────────────────────
  location /ws/ {
    rewrite ^/ws/(.*)$ /ws/$1 break;
    proxy_pass         $backend;
    proxy_http_version 1.1;
    proxy_set_header   Upgrade    $http_upgrade;
    proxy_set_header   Connection "upgrade";
    proxy_set_header   Host       $host;
  }

  # ── Keycloak (local IdP) ──────────────────────────────────────────────────
  location /auth/ {
    rewrite ^/auth/(.*)$ /$1 break;
    proxy_pass         $keycloak;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_buffer_size  128k;
    proxy_buffers      4 256k;
  }

  # ── Grafana (observability UI — local only) ───────────────────────────────
  location /grafana/ {
    rewrite ^/grafana/(.*)$ /$1 break;
    proxy_pass         $grafana;
    proxy_set_header   Host $host;
  }

  # ── Prometheus (metrics — local only) ────────────────────────────────────
  location /prometheus/ {
    rewrite ^/prometheus/(.*)$ /$1 break;
    proxy_pass         $prometheus;
    proxy_set_header   Host $host;
  }

  # ── Backend health (passthrough — used by docker healthcheck) ────────────
  location /q/ {
    proxy_pass         $backend;
    proxy_set_header   Host $host;
  }

  # ── Next.js frontend (catch-all) ─────────────────────────────────────────
  location / {
    proxy_pass         $frontend;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;

    # Next.js HMR / WebSocket
    proxy_http_version 1.1;
    proxy_set_header   Upgrade    $http_upgrade;
    proxy_set_header   Connection "upgrade";
  }
}
