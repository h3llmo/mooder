# ─────────────────────────────────────────────────────────
# Mooder Backend — application.properties
# Values here are LOCAL defaults (docker-compose environment).
# Staging / prod values are injected via environment variables.
# ─────────────────────────────────────────────────────────

quarkus.application.name=mooder-backend
quarkus.application.version=0.1.0

# ── Virtual threads (ADR-021) ─────────────────────────────
# REST resources use @RunOnVirtualThread — plain blocking code on Java 21 Loom threads.
# No Mutiny / reactive pg client. JDBC is used for PostgreSQL.
# Vert.x native transport improves I/O performance for the event loop underneath.
quarkus.vertx.prefer-native-transport=true

# ── HTTP ──────────────────────────────────────────────────
quarkus.http.port=8080
quarkus.http.cors=false

# ── Database ──────────────────────────────────────────────
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=${DB_USER:mooder}
quarkus.datasource.password=${DB_PASSWORD:mooder}
quarkus.datasource.jdbc.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:mooder}

# ── Flyway ────────────────────────────────────────────────
quarkus.flyway.migrate-at-start=true
quarkus.flyway.locations=classpath:db/migration
quarkus.flyway.baseline-on-migrate=true

# ── OIDC (Keycloak on local, Auth0 on stg/prod) ───────────
quarkus.oidc.enabled=true
quarkus.oidc.auth-server-url=${OIDC_SERVER_URL:http://keycloak:8080/realms/mooder}
quarkus.oidc.client-id=${OIDC_CLIENT_ID:mooder-backend}
quarkus.oidc.credentials.secret=${OIDC_CLIENT_SECRET:change-me}
quarkus.oidc.application-type=service

# ── Health / Observability ────────────────────────────────
quarkus.smallrye-health.root-path=/q/health
quarkus.micrometer.export.prometheus.enabled=true
quarkus.micrometer.export.prometheus.path=/q/metrics

# ── OpenTelemetry ─────────────────────────────────────────
quarkus.otel.enabled=${OTEL_ENABLED:false}
quarkus.otel.exporter.otlp.endpoint=${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4317}
quarkus.otel.service.name=${quarkus.application.name}

# ── Logging (structured JSON in prod, plain in local) ─────
quarkus.log.console.format=%d{HH:mm:ss} %-5p [%c{2.}] (%t) %s%e%n
%prod.quarkus.log.console.json=true

# ── Dev mode ──────────────────────────────────────────────
%dev.quarkus.http.port=8080
%dev.quarkus.log.level=DEBUG

# ── Test ──────────────────────────────────────────────────
%test.quarkus.datasource.db-kind=h2
%test.quarkus.datasource.jdbc.url=jdbc:h2:mem:mooder-test
%test.quarkus.oidc.enabled=false
