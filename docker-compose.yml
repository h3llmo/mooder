# ─────────────────────────────────────────────────────────────────────────────
# Mooder — Local development stack
#
# Single prerequisite: Docker Desktop
# Usage: docker compose up
#
# Entry point: http://localhost (nginx on :80)
#   /          → Next.js frontend
#   /api/      → Quarkus backend
#   /auth/     → Keycloak (local IdP)
#   /grafana/  → Grafana (observability)
#   /prometheus/ → Prometheus (metrics)
#
# All secrets are provided via Docker secrets / environment variables.
# No manual configuration required.
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: mooder-postgres
    environment:
      POSTGRES_USER:     ${DB_USER:-mooder}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-mooder}
      POSTGRES_DB:       ${DB_NAME:-mooder}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - mooder-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-mooder}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Keycloak (local IdP — ADR-004) ─────────────────────────────────────────
  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    container_name: mooder-keycloak
    command: start-dev --import-realm
    environment:
      KEYCLOAK_ADMIN:          admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_DB:                   dev-mem
    volumes:
      - ./mock-data/keycloak:/opt/keycloak/data/import
    networks:
      - mooder-network
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/8080 && echo ok || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 60s

  # ── Quarkus backend ─────────────────────────────────────────────────────────
  backend:
    build:
      context: ./src/backend
      dockerfile: Dockerfile
    container_name: mooder-backend
    environment:
      DB_HOST:          postgres
      DB_PORT:          5432
      DB_USER:          ${DB_USER:-mooder}
      DB_PASSWORD:      ${DB_PASSWORD:-mooder}
      DB_NAME:          ${DB_NAME:-mooder}
      OIDC_SERVER_URL:  http://keycloak:8080/realms/mooder
      OIDC_CLIENT_ID:   mooder-backend
      OIDC_CLIENT_SECRET: ${OIDC_CLIENT_SECRET:-mooder-backend-secret}
      MOODER_ENV:       local
      # Impersonation: local-only, strictly forbidden in prod (ADR-006)
      IMPERSONATE_ENABLED: "true"
    volumes:
      # Mock data mounted read-only — seeder service handles actual insertion
      - ./mock-data/resources:/app/mock-data:ro
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    networks:
      - mooder-network
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/q/health/ready || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ── DB seeder — runs once after backend is healthy (Flyway has run) ─────────
  # Inserts mock users, conversations and messages from seed.sql.
  # Container exits with code 0 on success; restart: on-failure handles transient issues.
  db-seeder:
    image: postgres:15-alpine
    container_name: mooder-db-seeder
    environment:
      PGPASSWORD: ${DB_PASSWORD:-mooder}
    command: >
      psql
        -h postgres
        -U ${DB_USER:-mooder}
        -d ${DB_NAME:-mooder}
        -f /seed/seed.sql
    volumes:
      - ./mock-data/resources:/seed:ro
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - mooder-network
    restart: on-failure

  # ── Next.js frontend ────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./src/frontend-desktop
      dockerfile: Dockerfile
    container_name: mooder-frontend
    environment:
      NODE_ENV:         production
      MOODER_API_URL:   http://backend:8080
      OIDC_ISSUER:      http://keycloak:8080/realms/mooder
      OIDC_CLIENT_ID:   mooder-desktop
      OIDC_CLIENT_SECRET: ${OIDC_DESKTOP_SECRET:-mooder-desktop-secret}
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - mooder-network

  # ── Nginx (single entry point — ADR-005) ────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: mooder-nginx
    ports:
      - "80:80"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infra/nginx/conf.d:/etc/nginx/conf.d:ro
    depends_on:
      - frontend
      - backend
      - keycloak
    networks:
      - mooder-network

  # ── Prometheus ──────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: mooder-prometheus
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    networks:
      - mooder-network

  # ── Grafana ─────────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: mooder-grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_SERVER_ROOT_URL:         http://localhost/grafana/
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
    volumes:
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - mooder-network

volumes:
  postgres-data:
  grafana-data:

networks:
  mooder-network:
    driver: bridge
